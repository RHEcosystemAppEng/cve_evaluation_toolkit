apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cve-evaluation-dev


namePrefix: dev-

# Override image tag for dev
images:
- name: cve-evaluation
  newName: quay.io/ecosystem-appeng/cve-evaluation
  newTag: dev

# Override replicas for dev
replicas:
- count: 1
  name: cve-evaluation

# Override ConfigMap for dev environment
configMapGenerator:
- behavior: replace
  literals:
  - LOG_LEVEL=DEBUG
  - EVALUATION_TIMEOUT=600
  name: evaluation-config

# Override Secret for dev environment
# IMPORTANT: Create secret.env file locally (add to .gitignore)
# Format: KEY=VALUE (one per line)
secretGenerator:
- behavior: replace
  envs:
  - secret.env
  name: evaluation-secret

# Patches for dev-specific changes
patches:
- path: patches.yaml
  target:
    kind: Deployment
    name: cve-evaluation
resources:
- ../../base
