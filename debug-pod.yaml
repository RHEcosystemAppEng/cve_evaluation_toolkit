apiVersion: v1
kind: Pod
metadata:
  name: debug-cve-evaluation
  namespace: exploit-iq-tests
spec:
  containers:
  - name: report
    image: quay.io/ecosystem-appeng/cve-evaluation:llama_prompt
    command: ["sleep", "infinity"]
    envFrom:
    - secretRef:
        name: evaluation-secret
    - configMapRef:
        name: evaluation-config
    env:
      - name: LOG_LEVEL
        value: "DEBUG"
  restartPolicy: Never