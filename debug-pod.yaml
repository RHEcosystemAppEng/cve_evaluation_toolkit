apiVersion: v1
kind: Pod
metadata:
  name: debug-cve-evaluation
  namespace: exploit-iq-tests
spec:
  containers:
  - name: report
    image: quay.io/ecosystem-appeng/cve-evaluation:latest
    command: ["sleep", "infinity"]
    env:
      - name: EXPLOIT_IQ_API_BASE
        valueFrom:
          configMapKeyRef:
            name: evaluation-config
            key: EXPLOIT_IQ_API_BASE
      - name: EXPLOIT_IQ_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: evaluation-secret
            key: EXPLOIT_IQ_API_TOKEN
      - name: NGC_API_KEY
        valueFrom:
          secretKeyRef:
            name: evaluation-secret
            key: NGC_API_KEY
      - name: LOG_LEVEL
        value: "DEBUG"
  restartPolicy: Never